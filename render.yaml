services:
  - type: web
    name: interview-trainer-agent
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: WATSONX_API_KEY
        sync: false
      - key: WATSONX_PROJECT_ID
        sync: false
      - key: WATSONX_URL
        value: https://us-south.ml.cloud.ibm.com
      - key: WATSONX_MODEL_ID
        value: ibm/granite-3-8b-instruct
      - key: IBM_IAM_URL
        value: https://iam.cloud.ibm.com/identity/token
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
